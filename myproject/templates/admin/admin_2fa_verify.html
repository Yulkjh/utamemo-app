<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二段階認証 - UTAMEMO Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #a0a0b0;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .email-display {
            color: #667eea;
            font-weight: 600;
        }
        .error-msg {
            background: rgba(255, 82, 82, 0.15);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .success-msg {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4caf50;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .code-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 0.5em;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            outline: none;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }
        .code-input:focus {
            border-color: #667eea;
        }
        .code-input::placeholder {
            letter-spacing: 0.2em;
            font-size: 1rem;
            color: #666;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            margin-bottom: 0.75rem;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #a0a0b0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">二段階認証</div>
        <div class="subtitle">
            管理画面へのアクセスを確認するため、<br>
            <span class="email-display">{{ email }}</span><br>
            に送信された6桁の認証コードを入力してください。
        </div>
        
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        
        {% if resent %}
        <div class="success-msg">認証コードを再送信しました。</div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <input 
                type="text" 
                name="code" 
                class="code-input" 
                placeholder="000000"
                maxlength="6" 
                pattern="[0-9]{6}"
                inputmode="numeric"
                autocomplete="one-time-code"
                autofocus
                required
            >
            <button type="submit" class="btn btn-primary">認証する</button>
        </form>
        
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="resend">
            <button type="submit" class="btn btn-secondary">コードを再送信</button>
        </form>
        
        <a href="/admin/logout/" class="back-link">ログアウト</a>
    </div>
</body>
</html>
