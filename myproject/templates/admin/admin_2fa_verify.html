<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二段階認証 - UTAMEMO Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg, oklch(98% 0.004 240));
            color: var(--fg, oklch(20% 0.02 240));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            background: var(--surface, oklch(100% 0 0));
            border: 1px solid var(--border, oklch(90% 0.006 240));
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--fg, oklch(20% 0.02 240));
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        .subtitle {
            color: var(--muted, oklch(50% 0.018 240));
            font-size: 0.88rem;
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        .email-display {
            color: var(--accent, oklch(56% 0.12 170));
            font-weight: 600;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #dc2626;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .success-msg {
            background: rgba(34, 197, 94, 0.06);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #16a34a;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .code-input {
            width: 100%;
            padding: 0.9rem 1rem;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 0.5em;
            background: var(--bg, oklch(98% 0.004 240));
            border: 1px solid var(--border, oklch(90% 0.006 240));
            border-radius: 8px;
            color: var(--fg, oklch(20% 0.02 240));
            outline: none;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
            font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
            font-variant-numeric: tabular-nums;
        }
        .code-input:focus {
            border-color: var(--accent, oklch(56% 0.12 170));
            box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
        }
        .code-input::placeholder {
            letter-spacing: 0.2em;
            font-size: 1rem;
            color: var(--muted, oklch(50% 0.018 240));
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border, oklch(90% 0.006 240));
            border-radius: 8px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--fg, oklch(20% 0.02 240));
            color: var(--surface, oklch(100% 0 0));
            border: none;
            margin-bottom: 0.75rem;
        }
        .btn-primary:hover { opacity: 0.85; }
        .btn-secondary {
            background: transparent;
            color: var(--muted, oklch(50% 0.018 240));
        }
        .btn-secondary:hover {
            border-color: var(--muted, oklch(50% 0.018 240));
            color: var(--fg, oklch(20% 0.02 240));
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--muted, oklch(50% 0.018 240));
            text-decoration: none;
            font-size: 0.82rem;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--fg, oklch(20% 0.02 240)); }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">二段階認証</div>
        <div class="subtitle">
            管理画面へのアクセスを確認するため、<br>
            <span class="email-display">{{ email }}</span><br>
            に送信された6桁の認証コードを入力してください。
        </div>
        
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        
        {% if resent %}
        <div class="success-msg">認証コードを再送信しました。</div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <input 
                type="text" 
                name="code" 
                class="code-input" 
                placeholder="000000"
                maxlength="6" 
                pattern="[0-9]{6}"
                inputmode="numeric"
                autocomplete="one-time-code"
                autofocus
                required
            >
            <button type="submit" class="btn btn-primary">認証する</button>
        </form>
        
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="resend">
            <button type="submit" class="btn btn-secondary">コードを再送信</button>
        </form>
        
        <a href="/admin/logout/" class="back-link">ログアウト</a>
    </div>
</body>
</html>
