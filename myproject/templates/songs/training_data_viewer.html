{% extends 'base.html' %}

{% block title %}学習データ管理 - UTAMEMO{% endblock %}

{% block content %}
<div class="td-container">
    <div class="td-header">
        <div class="td-header-left">
            <h1>Training Data</h1>
            <span class="td-badge" id="totalBadge">{{ total_count }} records</span>
        </div>
        <div class="td-header-right">
            <button class="td-btn td-btn-generate" onclick="generateData()" id="generateBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                Generate 5
            </button>
            <button class="td-btn td-btn-prompt" onclick="openPromptEditor()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Prompt
            </button>
            <button class="td-btn td-btn-refresh" onclick="reloadData()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                Reload
            </button>
            <a href="{% url 'songs:llm_guide' %}" class="td-btn td-btn-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Portal
            </a>
        </div>
    </div>

    <div id="generateStatus" class="td-generate-status" style="display: none;"></div>

    <div class="td-stats" id="genreStats"></div>

    <div class="td-filter">
        <div class="td-search-wrap">
            <svg class="td-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" id="searchInput" placeholder="Search records..." class="td-input">
        </div>
        <select id="genreFilter" class="td-select">
            <option value="">All Genres</option>
        </select>
        <span id="resultCount" class="td-result-count"></span>
    </div>

    <div id="recordsList"></div>
</div>

<!-- 編集モーダル -->
<div class="td-modal-overlay" id="editModal" style="display: none;" onclick="closeEditModal(event)">
    <div class="td-modal" onclick="event.stopPropagation()">
        <div class="td-modal-header">
            <h2 id="editModalTitle">Edit</h2>
            <button class="td-modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        <div class="td-modal-body">
            <div class="td-form-group">
                <label>Input — 学習テーマ</label>
                <textarea id="editInput" class="td-textarea" rows="8"></textarea>
            </div>
            <div class="td-form-group">
                <label>Output — 歌詞</label>
                <textarea id="editOutput" class="td-textarea td-textarea-lyrics" rows="16"></textarea>
            </div>
        </div>
        <div class="td-modal-footer">
            <button class="td-btn td-btn-cancel" onclick="closeEditModal()">Cancel</button>
            <button class="td-btn td-btn-save" onclick="saveEdit()">Save</button>
        </div>
    </div>
</div>

<!-- 削除確認モーダル -->
<div class="td-modal-overlay" id="deleteModal" style="display: none;" onclick="closeDeleteModal(event)">
    <div class="td-modal td-modal-sm" onclick="event.stopPropagation()">
        <div class="td-modal-header td-modal-header-danger">
            <h2>Delete Record</h2>
            <button class="td-modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="td-modal-body">
            <p id="deleteMessage" class="td-danger-text"></p>
            <div id="deletePreview" class="td-delete-preview"></div>
        </div>
        <div class="td-modal-footer">
            <button class="td-btn td-btn-cancel" onclick="closeDeleteModal()">Cancel</button>
            <button class="td-btn td-btn-delete" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<!-- プロンプト編集モーダル -->
<div class="td-modal-overlay" id="promptModal" style="display: none;" onclick="closePromptModal(event)">
    <div class="td-modal" onclick="event.stopPropagation()">
        <div class="td-modal-header">
            <h2>Instruction Template</h2>
            <button class="td-modal-close" onclick="closePromptModal()">&times;</button>
        </div>
        <div class="td-modal-body">
            <p class="td-modal-hint">
                Geminiに送信するInstruction部分。<code>{genre}</code> は自動でジャンル名に置き換わります。
            </p>
            <div class="td-form-group">
                <label>Template</label>
                <textarea id="promptInput" class="td-textarea" rows="18" style="font-size: 0.85rem; line-height: 1.7;"></textarea>
            </div>
        </div>
        <div class="td-modal-footer">
            <button class="td-btn td-btn-cancel" onclick="closePromptModal()">Cancel</button>
            <button class="td-btn td-btn-save" onclick="savePrompt()">Save</button>
        </div>
    </div>
</div>

<div class="td-toast" id="toast"></div>

<style>

    padding: 2.5rem 1.5rem;
    min-height: 100vh;
    background: #0d0d0d;
}

/* ── Header ── */
.td-header {

    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid #1a1a1a;
}
.td-header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
}
.td-header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    margin: 0;
    background: linear-gradient(135deg, #ff7940, #ff5722);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

}
.td-header-right {
    display: flex;
    align-items: center;
    gap: 0.5rem;

}

}

/* ── Buttons ── */
.td-btn {
    padding: 0.5rem 0.9rem;
    border: 1px solid #2a2a2a;

.td-btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
.td-btn-prompt { border-color: #333; }
.td-btn-prompt:hover { border-color: #ff7940; color: #ff7940; }
.td-btn-refresh { border-color: #333; }
.td-btn-refresh:hover { border-color: #4ecdc4; color: #4ecdc4; }
.td-btn-back { border-color: #222; color: #666; }
.td-btn-back:hover { color: #aaa; border-color: #333; }

/* ── Generate Status ── */

/* ── Filter Bar ── */

.td-card:hover { border-color: #2a2a2a; }
.td-card-header {
    display: flex;
    align-items: center;
    padding: 0.7rem 1rem;
    cursor: pointer;
    gap: 0.75rem;
    user-select: none;
}
.td-card-num {
    color: #555;
    font-weight: 600;
    font-size: 0.78rem;
    min-width: 42px;
    font-variant-numeric: tabular-nums;
}
.td-card-preview {

    color: #aaa;
    font-size: 0.85rem;

}
.td-card-genre {
    background: #1a1a1a;
    color: #ff7940;
    padding: 0.2rem 0.65rem;

    text-transform: uppercase;

.td-card-actions { display: flex; gap: 0.25rem; }

}
.td-chevron.open { transform: rotate(180deg); }

.td-card-body {
    border-top: 1px solid #1a1a1a;
    padding: 1.25rem;
    display: none;
}
.td-card-body.show { display: block; }
.td-section { margin-bottom: 1.25rem; }
.td-section:last-child { margin-bottom: 0; }
.td-section-label {
    color: #555;
    text-transform: uppercase;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
}
.td-input-text {
    background: #0a0a0a;
    padding: 1rem;
    border-radius: 0.4rem;
    color: #bbb;
    line-height: 1.7;
    font-size: 0.85rem;
    border: 1px solid #151515;
}
.td-output-lyrics {
    background: #0a0a0a;
    padding: 1rem;
    border-radius: 0.4rem;
    color: #7fdbca;
    line-height: 1.8;
    font-size: 0.85rem;
    white-space: pre-wrap;
    font-family: 'Inter', sans-serif;

    max-height: 500px;

}
.td-modal {

    border: 1px solid #222;

    max-height: 90vh;
    display: flex;
    flex-direction: column;

}
.td-modal-sm { max-width: 480px; }
.td-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid #1a1a1a;
}
.td-modal-header h2 {

    margin: 0;
    font-size: 1.1rem;

    letter-spacing: -0.01em;
}
.td-modal-header-danger h2 { color: #e74c3c; }
.td-modal-close {
    background: none;
    border: none;
    color: #555;
    font-size: 1.4rem;
    cursor: pointer;

    line-height: 1;

}
.td-modal-close:hover { color: #fff; }
.td-modal-body {
    padding: 1.5rem;
    overflow-y: auto;
    flex: 1;
}
.td-modal-hint {
    color: #555;
    font-size: 0.82rem;
    margin-bottom: 1rem;
    line-height: 1.6;
}
.td-modal-hint code {
    color: #ff7940;
    background: #1a1a1a;

}
.td-modal-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid #1a1a1a;

.td-form-group { margin-bottom: 1.25rem; }
.td-form-group:last-child { margin-bottom: 0; }
.td-form-group label {

    color: #666;

}
.td-textarea {
    width: 100%;
    padding: 0.85rem;
    background: #0a0a0a;

.td-btn-save {

.td-btn-cancel { border-color: #2a2a2a; color: #666; }

.td-btn-delete {

    color: #fff;

}
.td-btn-delete:hover { background: #c0392b; color: #fff; }
.td-danger-text { color: #e74c3c; font-size: 0.92rem; }

.td-delete-preview {
    background: #0a0a0a;
    padding: 0.75rem;
    border-radius: 0.4rem;
    color: #666;
    font-size: 0.82rem;

/* ── Toast ── */
.td-toast {

<script>
const CSRF_TOKEN = '{{ csrf_token }}';
const API_URL = '{% url "songs:training_data_api" %}';
const GENERATE_URL = '{% url "songs:training_data_generate" %}';
const PROMPT_URL = '{% url "songs:training_prompt_api" %}';

let allRecords = {{ records_json|safe }};
let editingIndex = -1;
let deletingIndex = -1;

function extractGenre(instruction) {
    const m = (instruction || '').match(/から(\w+)ジャンルの歌詞/);
    return m ? m[1] : 'other';
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'td-toast show ' + type;
    setTimeout(() => t.classList.remove('show'), 3000);
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function renderStats() {
    const counts = {};
    allRecords.forEach(r => {
        const g = extractGenre(r.instruction);
        counts[g] = (counts[g] || 0) + 1;
    });
    document.getElementById('genreStats').innerHTML = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([g, c]) => `<div class="td-stat-chip">${escapeHtml(g)}<span class="count">${c}</span></div>`)
        .join('');

    const sel = document.getElementById('genreFilter');
    const cur = sel.value;
    sel.innerHTML = '<option value="">すべてのジャンル</option>';
    Object.keys(counts).sort().forEach(g => {
        sel.innerHTML += `<option value="${escapeHtml(g)}">${escapeHtml(g)} (${counts[g]})</option>`;
    });
    sel.value = cur;
}

function renderRecords() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const genre = document.getElementById('genreFilter').value;
    const container = document.getElementById('recordsList');
    let html = '';
    let visible = 0;

    allRecords.forEach((r, i) => {
        const g = extractGenre(r.instruction);
        const text = ((r.input || '') + ' ' + (r.output || '')).toLowerCase();
        if (query && !text.includes(query)) return;
        if (genre && g !== genre) return;
        visible++;

        const preview = (r.input || '').substring(0, 100);
        html += `
        <div class="td-card" id="card-${i}">
            <div class="td-card-header" onclick="toggleCard(${i})">
                <span class="td-card-num">#${i + 1}</span>
                <span class="td-card-preview">${escapeHtml(preview)}</span>
                <span class="td-card-genre">${escapeHtml(g)}</span>
                <div class="td-card-actions" onclick="event.stopPropagation()">
                    <button class="td-act-edit" onclick="openEdit(${i})" title="Edit">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="td-act-delete" onclick="openDelete(${i})" title="Delete">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                    </button>
                </div>
                <span class="td-chevron" id="chev-${i}">&#9662;</span>
            </div>
            <div class="td-card-body" id="body-${i}">
                <div class="td-section">
                    <div class="td-section-label">Input</div>
                    <div class="td-input-text">${escapeHtml(r.input || '')}</div>
                </div>
                <div class="td-section">
                    <div class="td-section-label">Output</div>
                    <pre class="td-output-lyrics">${escapeHtml(r.output || '')}</pre>
                </div>
            </div>
        </div>`;
    });

    container.innerHTML = html;
    document.getElementById('resultCount').textContent =
        query || genre ? `${visible} / ${allRecords.length} 件表示` : '';
    document.getElementById('totalBadge').textContent = `合計 ${allRecords.length} 件`;
    renderStats();
}

function toggleCard(i) {
    const body = document.getElementById('body-' + i);
    const chev = document.getElementById('chev-' + i);
    body.classList.toggle('show');
    chev.classList.toggle('open');
}

function openEdit(i) {
    editingIndex = i;
    const r = allRecords[i];
    document.getElementById('editModalTitle').textContent = `Edit #${i + 1}`;
    document.getElementById('editInput').value = r.input || '';
    document.getElementById('editOutput').value = r.output || '';
    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('editModal').style.display = 'none';
    editingIndex = -1;
}

async function saveEdit() {
    if (editingIndex < 0) return;
    const input = document.getElementById('editInput').value;
    const output = document.getElementById('editOutput').value;
    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
            body: JSON.stringify({ action: 'update', index: editingIndex, input, output })
        });
        const data = await res.json();
        if (data.ok) {
            allRecords[editingIndex].input = input;
            allRecords[editingIndex].output = output;
            renderRecords();
            closeEditModal();
            showToast(data.message, 'success');
        } else {
            showToast(data.error || 'エラー', 'error');
        }
    } catch (err) {
        showToast('通信エラー: ' + err.message, 'error');
    }
}

function openDelete(i) {
    deletingIndex = i;
    const r = allRecords[i];
    document.getElementById('deleteMessage').textContent = `Record #${i + 1} will be permanently deleted.`;
    document.getElementById('deletePreview').textContent = (r.input || '').substring(0, 200);
    document.getElementById('deleteModal').style.display = 'flex';
}

function closeDeleteModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('deleteModal').style.display = 'none';
    deletingIndex = -1;
}

async function confirmDelete() {
    if (deletingIndex < 0) return;
    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
            body: JSON.stringify({ action: 'delete', index: deletingIndex })
        });
        const data = await res.json();
        if (data.ok) {
            allRecords.splice(deletingIndex, 1);
            renderRecords();
            closeDeleteModal();
            showToast(data.message, 'success');
        } else {
            showToast(data.error || 'エラー', 'error');
        }
    } catch (err) {
        showToast('通信エラー: ' + err.message, 'error');
    }
}

async function reloadData() {
    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
            body: JSON.stringify({ action: 'reload' })
        });
        const data = await res.json();
        if (data.ok) {
            allRecords = data.records;
            renderRecords();
            showToast(`Data reloaded (${data.total} records)`, 'success');
        } else {
            showToast(data.error || 'エラー', 'error');
        }
    } catch (err) {
        showToast('通信エラー: ' + err.message, 'error');
    }
}

// ── データ生成 ──
async function generateData() {
    const btn = document.getElementById('generateBtn');
    const statusEl = document.getElementById('generateStatus');
    btn.disabled = true;
    btn.textContent = 'Generating...';
    statusEl.style.display = 'block';
    statusEl.innerHTML = 'Generating 5 records via Gemini API (30〜60s)...';

    try {
        const res = await fetch(GENERATE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
        });
        const data = await res.json();
        if (data.ok) {
            let html = `${data.generated_count} records generated (total: ${data.total})<br>`;
            data.generated.forEach(g => {
                html += `<span class="gen-item">[${escapeHtml(g.subject)}] ${escapeHtml(g.theme)} — ${escapeHtml(g.genre)}</span><br>`;
            });
            if (data.errors.length > 0) {
                html += '<br>';
                data.errors.forEach(e => {
                    html += `<span class="gen-error">${escapeHtml(e)}</span><br>`;
                });
            }
            statusEl.innerHTML = html;
            allRecords = data.records;
            renderRecords();
            showToast(`${data.generated_count} records generated`, 'success');
        } else {
            statusEl.innerHTML = `<span class="gen-error">Error: ${escapeHtml(data.error || 'Unknown')}</span>`;
            showToast(data.error || 'Error', 'error');
        }
    } catch (err) {
        statusEl.innerHTML = `<span class="gen-error">Connection error: ${escapeHtml(err.message)}</span>`;
        showToast('Connection error: ' + err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Generate 5';
    }
}

// ── プロンプト編集 ──
async function openPromptEditor() {
    try {
        const res = await fetch(PROMPT_URL, { headers: { 'X-CSRFToken': CSRF_TOKEN } });
        const data = await res.json();
        if (data.ok) {
            document.getElementById('promptInput').value = data.instruction_template;
            document.getElementById('promptModal').style.display = 'flex';
        } else {
            showToast(data.error || 'エラー', 'error');
        }
    } catch (err) {
        showToast('通信エラー: ' + err.message, 'error');
    }
}

function closePromptModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('promptModal').style.display = 'none';
}

async function savePrompt() {
    const template = document.getElementById('promptInput').value;
    if (!template.includes('{genre}')) {
        showToast('{genre} placeholder is required', 'error');
        return;
    }
    try {
        const res = await fetch(PROMPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
            body: JSON.stringify({ instruction_template: template })
        });
        const data = await res.json();
        if (data.ok) {
            closePromptModal();
            showToast(data.message, 'success');
        } else {
            showToast(data.error || 'エラー', 'error');
        }
    } catch (err) {
        showToast('通信エラー: ' + err.message, 'error');
    }
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeEditModal();
        closeDeleteModal();
        closePromptModal();
    }
});

document.getElementById('searchInput').addEventListener('input', renderRecords);
document.getElementById('genreFilter').addEventListener('change', renderRecords);

renderRecords();
</script>
{% endblock %}
