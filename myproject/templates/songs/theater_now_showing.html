<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上映中作品 | UNITE CINEMA MINATO</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #070a0f; font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif; color: #1f2734; }
    .page { width: 960px; min-height: 100vh; margin: 0 auto; background: #eef1f6; padding: 18px; }
    .back-link { color: #21314d; text-decoration: none; font-size: 13px; font-weight: 800; }
    h1 { margin: 10px 0 18px; color: #243047; font-size: 28px; font-weight: 900; letter-spacing: 1px; }
    .note { margin-bottom: 16px; color: #4f5d73; font-size: 13px; font-weight: 700; }
    .movie { background: #fff; border: 1px solid #d3d8e4; margin-bottom: 12px; }
    .title { background: #111723; color: #fff; padding: 12px 16px; font-size: 18px; font-weight: 900; }
    .body { padding: 12px 16px; }
    .show { margin-bottom: 8px; font-size: 14px; font-weight: 700; }
    .show:last-child { margin-bottom: 0; }
    .reserve { display: inline-flex; margin-left: 10px; padding: 3px 8px; border-radius: 4px; background: linear-gradient(#ff9f72,#f26428); color: #fff; text-decoration: none; font-size: 12px; font-weight: 900; }
    @media (max-width: 980px) { .page { width: 100%; } }
  </style>
</head>
<body>
  <div class="page">
    <a class="back-link" href="{% url 'songs:unite_cinema_minato' %}">‹ 上映スケジュールへ戻る</a>
    <h1>上映中作品</h1>
    <div class="note">対象日: {{ selected_date_label }}</div>

    {% for movie in now_showing_movies %}
      <article class="movie">
        <div class="title">{{ movie.title }}</div>
        <div class="body">
          {% for show in movie.shows %}
            <div class="show">
              {{ show.time }} - {{ show.end_time }}
              <a class="reserve" href="{% url 'songs:unite_cinema_minato_reserve' %}?date={{ selected_date_query }}&show={{ show.show_key }}">予約</a>
            </div>
          {% endfor %}
        </div>
      </article>
    {% endfor %}
  </div>
</body>
</html>
