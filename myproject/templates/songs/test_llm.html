{% extends 'base.html' %}

{% block title %}LLMテスト - UTAMEMO Staff{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 900px;">
    <!-- ヘッダー -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="color: #ff7940;">
            <i class="bi bi-robot"></i> LLM 推論テスト
        </h2>
        <a href="{% url 'songs:llm_guide' %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> スタッフポータル
        </a>
    </div>

    <!-- サーバーステータス -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1"><i class="bi bi-hdd-network"></i> 推論サーバー</h5>
                    <small class="text-muted" id="serverUrl">{{ inference_url|default:"未設定" }}</small>
                </div>
                <div id="serverStatus">
                    <span class="badge bg-secondary"><i class="bi bi-hourglass-split"></i> 確認中...</span>
                </div>
            </div>
            <div id="serverDetails" class="mt-2 d-none">
                <div class="row g-2 mt-1">
                    <div class="col-auto"><span class="badge bg-light text-dark" id="srvEngine"></span></div>
                    <div class="col-auto"><span class="badge bg-light text-dark" id="srvModel"></span></div>
                    <div class="col-auto"><span class="badge bg-light text-dark" id="srvGpu"></span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 入力フォーム -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3"><i class="bi bi-pencil-square"></i> テスト入力</h5>
            
            <div class="mb-3">
                <label for="studyText" class="form-label fw-bold">学習テキスト</label>
                <textarea class="form-control" id="studyText" rows="5" 
                    placeholder="歌詞にしたい学習内容を入力...&#10;例: 織田信長は1534年に尾張国で生まれた戦国武将。桶狭間の戦い(1560年)で今川義元を破り..."></textarea>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label for="genreSelect" class="form-label fw-bold">ジャンル</label>
                    <select class="form-select" id="genreSelect">
                        <option value="pop" selected>Pop</option>
                        <option value="rock">Rock</option>
                        <option value="hip-hop">Hip-Hop</option>
                        <option value="EDM">EDM</option>
                        <option value="jazz">Jazz</option>
                        <option value="R&B">R&B</option>
                        <option value="folk">Folk</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="langMode" class="form-label fw-bold">言語モード</label>
                    <select class="form-select" id="langMode">
                        <option value="japanese" selected>日本語歌詞</option>
                        <option value="english">英語歌詞</option>
                        <option value="english_vocab">英語学習+日本語歌詞</option>
                        <option value="chinese">中国語歌詞</option>
                        <option value="chinese_vocab">中国語学習+日本語歌詞</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">バックエンド</label>
                    <select class="form-select" id="backendSelect">
                        <option value="local" selected>ローカルLLM</option>
                        <option value="gemini">Gemini (比較用)</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="customRequest" class="form-label fw-bold">カスタム指示 <small class="text-muted">(任意)</small></label>
                <input type="text" class="form-control" id="customRequest" placeholder="例: サビを特にキャッチーにして">
            </div>

            <button class="btn btn-lg w-100" id="generateBtn" 
                style="background: linear-gradient(135deg, #ff7940, #ff9966); color: white; border: none;"
                onclick="generateLyrics()">
                <i class="bi bi-magic"></i> 歌詞を生成
            </button>
        </div>
    </div>

    <!-- 結果表示 -->
    <div class="card border-0 shadow-sm mb-4 d-none" id="resultCard">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0"><i class="bi bi-music-note-list"></i> 生成結果</h5>
                <div>
                    <span class="badge bg-light text-dark" id="resultMeta"></span>
                    <button class="btn btn-sm btn-outline-secondary ms-2" onclick="copyLyrics()">
                        <i class="bi bi-clipboard"></i> コピー
                    </button>
                </div>
            </div>
            <pre class="p-3 rounded" id="resultLyrics" 
                style="background: #1a1a2e; color: #e0e0e0; white-space: pre-wrap; font-family: 'Inter', monospace; font-size: 0.95rem; line-height: 1.7; max-height: 600px; overflow-y: auto;"></pre>
        </div>
    </div>

    <!-- ローディング -->
    <div class="text-center py-5 d-none" id="loadingArea">
        <div class="spinner-border" style="color: #ff7940; width: 3rem; height: 3rem;" role="status"></div>
        <p class="mt-3 text-muted">推論サーバーで生成中... <span id="elapsedTime">0</span>秒</p>
    </div>

    <!-- エラー -->
    <div class="alert alert-danger d-none" id="errorAlert">
        <i class="bi bi-exclamation-triangle"></i> <span id="errorMessage"></span>
    </div>
</div>

<script>
const csrfToken = '{{ csrf_token }}';
let timerInterval = null;

// ページ読み込み時にヘルスチェック
document.addEventListener('DOMContentLoaded', checkHealth);

async function checkHealth() {
    const statusEl = document.getElementById('serverStatus');
    const detailsEl = document.getElementById('serverDetails');
    try {
        const resp = await fetch('{% url "songs:test_llm_health" %}', {
            headers: {'X-CSRFToken': csrfToken}
        });
        const data = await resp.json();
        if (data.online) {
            statusEl.innerHTML = '<span class="badge bg-success"><i class="bi bi-check-circle"></i> オンライン</span>';
            detailsEl.classList.remove('d-none');
            document.getElementById('srvEngine').textContent = 'Engine: ' + (data.engine || '-');
            document.getElementById('srvModel').textContent = 'Model: ' + (data.base_model || '-');
            document.getElementById('srvGpu').textContent = 'GPU: ' + (data.gpu || '-');
        } else if (data.training) {
            const statusLabel = data.training_status === 'generating' ? 'データ生成中' : '学習中';
            statusEl.innerHTML = '<span class="badge bg-warning text-dark"><i class="bi bi-gpu-card"></i> ' + statusLabel + '</span>';
            detailsEl.classList.remove('d-none');
            document.getElementById('srvEngine').textContent = '';
            document.getElementById('srvModel').textContent = 'GPU学習中のため推論不可';
            document.getElementById('srvGpu').textContent = 'Geminiバックエンドは利用可能';
        } else {
            statusEl.innerHTML = '<span class="badge bg-danger"><i class="bi bi-x-circle"></i> オフライン</span>';
        }
    } catch(e) {
        statusEl.innerHTML = '<span class="badge bg-danger"><i class="bi bi-x-circle"></i> 接続エラー</span>';
    }
}

async function generateLyrics() {
    const text = document.getElementById('studyText').value.trim();
    if (!text) {
        alert('学習テキストを入力してください');
        return;
    }

    const btn = document.getElementById('generateBtn');
    const loadingArea = document.getElementById('loadingArea');
    const resultCard = document.getElementById('resultCard');
    const errorAlert = document.getElementById('errorAlert');
    const elapsedEl = document.getElementById('elapsedTime');

    // UI更新
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 生成中...';
    loadingArea.classList.remove('d-none');
    resultCard.classList.add('d-none');
    errorAlert.classList.add('d-none');

    // タイマー開始
    let elapsed = 0;
    elapsedEl.textContent = '0';
    timerInterval = setInterval(() => {
        elapsed++;
        elapsedEl.textContent = elapsed;
    }, 1000);

    try {
        const resp = await fetch('{% url "songs:test_llm_generate" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify({
                text: text,
                genre: document.getElementById('genreSelect').value,
                language_mode: document.getElementById('langMode').value,
                custom_request: document.getElementById('customRequest').value,
                backend: document.getElementById('backendSelect').value,
            }),
        });

        const data = await resp.json();

        if (data.success) {
            resultCard.classList.remove('d-none');
            document.getElementById('resultLyrics').textContent = data.lyrics;
            const meta = [];
            if (data.generation_time) meta.push(data.generation_time + '秒');
            if (data.backend) meta.push(data.backend);
            document.getElementById('resultMeta').textContent = meta.join(' | ');
        } else {
            errorAlert.classList.remove('d-none');
            document.getElementById('errorMessage').textContent = data.error || '生成に失敗しました';
        }
    } catch(e) {
        errorAlert.classList.remove('d-none');
        document.getElementById('errorMessage').textContent = '通信エラー: ' + e.message;
    } finally {
        clearInterval(timerInterval);
        loadingArea.classList.add('d-none');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-magic"></i> 歌詞を生成';
    }
}

function copyLyrics() {
    const text = document.getElementById('resultLyrics').textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = event.target.closest('button');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-check"></i> コピー済み';
        setTimeout(() => btn.innerHTML = orig, 1500);
    });
}
</script>
{% endblock %}
