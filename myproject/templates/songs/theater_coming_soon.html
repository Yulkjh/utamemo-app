<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公開予定作品 | UNITE CINEMA MINATO</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #070a0f; font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif; color: #1f2734; }
    .page { width: 960px; min-height: 100vh; margin: 0 auto; background: #eef1f6; padding: 18px; }
    .back-link { color: #21314d; text-decoration: none; font-size: 13px; font-weight: 800; }
    h1 { margin: 10px 0 18px; color: #243047; font-size: 28px; font-weight: 900; letter-spacing: 1px; }
    .item { background: #fff; border: 1px solid #d3d8e4; margin-bottom: 10px; padding: 14px 16px; }
    .title { font-size: 17px; font-weight: 900; color: #1f2d45; }
    .meta { margin-top: 5px; font-size: 13px; color: #4a586d; font-weight: 700; }
    @media (max-width: 980px) { .page { width: 100%; } }
  </style>
</head>
<body>
  <div class="page">
    <a class="back-link" href="{% url 'songs:unite_cinema_minato' %}">‹ 上映スケジュールへ戻る</a>
    <h1>公開予定作品</h1>

    {% for movie in upcoming_movies %}
      <article class="item">
        <div class="title">{{ movie.title }}</div>
        <div class="meta">公開予定: {{ movie.release_date_label }} / 上映時間: {{ movie.minutes }}分</div>
      </article>
    {% endfor %}
  </div>
</body>
</html>
