<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>劇場アクセス | UNITE CINEMA MINATO</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #070a0f; font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif; color: #1f2734; }
    a { color: inherit; }
    .page { width: 960px; min-height: 100vh; margin: 0 auto; background: #eef1f6; padding: 18px 18px 46px; }
    .back-link { display: inline-flex; margin-bottom: 14px; color: #21314d; font-size: 13px; font-weight: 800; text-decoration: none; }
    h1 { margin: 0 0 14px; color: #243047; font-size: 28px; font-weight: 900; letter-spacing: 1px; }
    .panel { background: #fff; border: 1px solid #d3d8e4; box-shadow: 0 16px 38px rgba(13,21,35,0.13); overflow: hidden; }
    .address-bar { background: repeating-linear-gradient(135deg,#2d3035 0,#2d3035 2px,#22252a 2px,#22252a 5px); color: #fff; padding: 16px 20px; font-size: 23px; font-weight: 900; letter-spacing: 1px; border-bottom: 4px solid #1499ff; }
    .map-area { display: grid; grid-template-columns: minmax(0, 1fr) 250px; gap: 22px; padding: 20px; }
    .map-card { height: 520px; position: relative; overflow: hidden; background: #dce7e2; border: 1px solid #cbd4df; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5); }
    .map-card iframe { width: calc(100% + 72px); height: calc(100% + 72px); border: 0; transform: translate(-36px,-36px); }
    .map-badge { position: absolute; left: 18px; bottom: 18px; background: rgba(0,0,0,0.82); color: #fff; padding: 10px 14px; font-size: 13px; font-weight: 900; letter-spacing: 1px; box-shadow: 0 8px 22px rgba(0,0,0,0.24); }
    .map-link { display: inline-flex; justify-content: center; width: 100%; margin-top: 12px; background: linear-gradient(#65a7db,#3d86bf); color: #fff; border-radius: 4px; padding: 12px 16px; font-size: 15px; font-weight: 900; text-decoration: none; box-shadow: inset 0 1px 0 rgba(255,255,255,0.35); }
    .side-note { color: #2f3540; font-size: 15px; line-height: 1.8; }
    .info-card { border: 1px solid #d5dce7; background: #f9fbff; padding: 16px; margin-bottom: 12px; }
    .info-card strong { display: block; margin-bottom: 8px; color: #22304f; font-size: 16px; }
    .section-title { margin: 2px 20px 0; background: #111723; color: #fff; padding: 13px 18px; font-size: 19px; font-weight: 900; border-left: 6px solid #e00000; }
    .text-block { padding: 16px 20px 22px; font-size: 16px; line-height: 1.8; }
    @media (max-width: 980px) {
      .page { width: 100%; }
      .map-area { grid-template-columns: 1fr; }
      .map-card { height: 420px; }
      .address-bar { font-size: 19px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="back-link" href="{% url 'songs:unite_cinema_minato' %}">‹ 上映スケジュールへ戻る</a>
    <h1>劇場アクセス</h1>
    <section class="panel">
      <div class="address-bar">埼玉県比企郡ときがわ町西平1345</div>
      <div class="map-area">
        <div>
          <div class="map-card" aria-label="劇場周辺地図">
            <iframe
              title="埼玉県比企郡ときがわ町西平1345のGoogle Map"
              src="https://maps.google.com/maps?q=%E5%9F%BC%E7%8E%89%E7%9C%8C%E6%AF%94%E4%BC%81%E9%83%A1%E3%81%A8%E3%81%8D%E3%81%8C%E3%82%8F%E7%94%BA%E8%A5%BF%E5%B9%B31345&z=15&output=embed"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
            <div class="map-badge">UNITE CINEMA MINATO</div>
          </div>
          <a class="map-link" href="https://www.google.com/maps/search/?api=1&query=%E5%9F%BC%E7%8E%89%E7%9C%8C%E6%AF%94%E4%BC%81%E9%83%A1%E3%81%A8%E3%81%8D%E3%81%8C%E3%82%8F%E7%94%BA%E8%A5%BF%E5%B9%B31345" target="_blank" rel="noopener">Google Mapで開く</a>
        </div>
        <div class="side-note">
          <div class="info-card">
            <strong>所在地</strong>
            埼玉県比企郡ときがわ町西平1345
          </div>
          <div class="info-card">
            <strong>案内</strong>
            車でお越しの場合は住所を目的地に設定してください。山側の道は暗くなりやすいので、上映前は時間に余裕を持ってお越しください。
          </div>
        </div>
      </div>

      <div class="section-title">交通案内</div>
      <div class="text-block">
        お車でお越しの場合は、埼玉県比企郡ときがわ町西平1345を目的地に設定してください。
      </div>
    </section>
  </div>
</body>
</html>
