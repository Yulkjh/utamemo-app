<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>料金 | UNITE CINEMA MINATO</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #070a0f; font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif; color: #1f2734; }
    a { color: inherit; text-decoration: none; }
    .page { width: 960px; min-height: 100vh; margin: 0 auto; background: #eef1f6; }
    .header { background: #fff; padding: 18px 24px; border-bottom: 4px solid #1288cb; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; color: #21314d; font-size: 13px; font-weight: 800; }
    .brand { margin-top: 14px; color: #22304f; font-size: 22px; font-weight: 700; letter-spacing: 5px; }
    .content { padding: 42px 24px 70px; }
    .panel { background: #fff; border: 1px solid #d3d8e4; box-shadow: 0 16px 40px rgba(13,21,35,0.12); }
    .panel-title { background: repeating-linear-gradient(135deg,#1b263a 0,#1b263a 2px,#141d2e 2px,#141d2e 5px); color: #fff; padding: 16px 20px; font-size: 20px; font-weight: 900; letter-spacing: 2px; border-left: 6px solid #2892ce; }
    .message { min-height: 260px; display: grid; place-items: center; padding: 36px 20px; text-align: center; }
    .message-main { color: #172136; font-size: 42px; font-weight: 900; letter-spacing: 2px; line-height: 1.35; }
    .message-sub { margin-top: 18px; color: #5a6577; font-size: 14px; font-weight: 700; }
    .button-row { margin-top: 26px; display: flex; justify-content: center; }
    .button { background: linear-gradient(#65a7db,#3d86bf); color: #fff; border-radius: 4px; padding: 12px 24px; font-weight: 900; box-shadow: inset 0 1px 0 rgba(255,255,255,0.35); }
    @media (max-width: 980px) {
      .page { width: 100%; }
      .message-main { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <a class="back-link" href="{% url 'songs:unite_cinema_minato' %}">‹ 上映スケジュールへ戻る</a>
      <div class="brand">UNITE CINEMA MINATO</div>
    </header>

    <main class="content">
      <section class="panel">
        <div class="panel-title">料金</div>
        <div class="message">
          <div>
            <div class="message-main">500円かお菓子持ってきてー</div>
            <div class="message-sub">料金ページ</div>
            <div class="button-row">
              <a class="button" href="{% url 'songs:unite_cinema_minato' %}">戻る</a>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
