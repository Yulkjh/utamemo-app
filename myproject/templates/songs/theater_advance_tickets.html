<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>前売情報 | UNITE CINEMA MINATO</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #070a0f; font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif; color: #1f2734; }
    .page { width: 960px; min-height: 100vh; margin: 0 auto; background: #eef1f6; padding: 18px; }
    .back-link { color: #21314d; text-decoration: none; font-size: 13px; font-weight: 800; }
    h1 { margin: 10px 0 18px; color: #243047; font-size: 28px; font-weight: 900; letter-spacing: 1px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d3d8e4; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #e2e6ef; font-size: 14px; }
    th { background: #111723; color: #fff; text-align: left; font-weight: 900; }
    .buy { display: inline-flex; padding: 4px 9px; border-radius: 4px; background: linear-gradient(#65a7db,#3d86bf); color: #fff; text-decoration: none; font-size: 12px; font-weight: 900; }
    @media (max-width: 980px) { .page { width: 100%; } }
  </style>
</head>
<body>
  <div class="page">
    <a class="back-link" href="{% url 'songs:unite_cinema_minato' %}">‹ 上映スケジュールへ戻る</a>
    <h1>前売情報</h1>

    <table>
      <thead>
        <tr>
          <th>作品名</th>
          <th>前売価格</th>
          <th>販売終了</th>
          <th>公開日</th>
          <th>購入</th>
        </tr>
      </thead>
      <tbody>
        {% for item in ticket_items %}
          <tr>
            <td>{{ item.title }}</td>
            <td>{{ item.price }}円</td>
            <td>{{ item.sales_end_label }}</td>
            <td>{{ item.release_date_label }}</td>
            <td><a class="buy" href="{% url 'songs:unite_cinema_minato_survey' %}">購入希望</a></td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
